<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./recursos/css/index.css">
    <link rel="icon" href="./recursos/imagenes/logo balsamoa.webp" type="image/webp">
    <script type="module" src="./recursos/js/productos.js"></script>
    <script type="module" src="./recursos/js/menu.js"></script>
    <title>Balsamoa | Prodcutos</title>
</head>

<body>
    <header class="encabezadoPrincipal">
        <div class="contenidoEncPag">
            <a href="./index.html">
                <img src="./recursos/imagenes/logo balsamoa.webp" alt="Logo Balsamoa">
            </a>

            <!-- Boton menu de celular -->
            <button class="menuBtn" id="id_menuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav id="id_menuNav">
                <ul>
                    <li><a href="./index.html">Inicio</a></li>
                    <li><a href="./productos.html">Productos</a></li>
                    <li><a href="./nosotros.html">Nosotros</a></li>
                    <li><a href="./contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <!-- Fondo para boton menu de celular -->
    <div class="menuOverlay" id="id_menuOverlay"></div>

    <main>

        <section class="barraControl">

            <details id="id_menuFiltros" class="menuColapsable">
                <summary class="botonDesplegable">Filtrar Por:</summary>

                <div class="contenidoFiltro">
                    <form id="id_formFiltros">
                        <h3>Talle</h3>
                        <label><input type="checkbox" name="talle" value="S">S</label>
                        <label><input type="checkbox" name="talle" value="M">M</label>
                        <label><input type="checkbox" name="talle" value="L">L</label>
                        <label><input type="checkbox" name="talle" value="XL">XL</label>

                        <h3>Precio</h3>
                        <label>Desde: <input type="number" name="precio-desde" min="0" placeholder="0"></label>
                        <label>Hasta: <input type="number" name="precio-hasta" min="0" placeholder="0"></label>

                        <button type="submit">Aplicar Filtros</button>
                        <button type="reset">Limpiar Filtros</button>
                    </form>
                </div>
            </details>

            <details id="id_menuOrdenamientos" class="menuColapsable">
                <summary class="botonDesplegable">Ordenar por:</summary>

                <div class="contenidoOrdenar">
                    <button class="opcionOrden" data-value="precioAsc">Precio: Menor a Mayor</button>
                    <button class="opcionOrden" data-value="precioDesc">Precio: Mayor a Menor</button>
                    <button class="opcionOrden" data-value="masNuevo">Más Nuevo al Más Antiguo</button>
                    <button class="opcionOrden" data-value="masAntiguo">Más Antiguo al Más Nuevo</button>
                </div>
            </details>
        </section>

        <h1>Productos</h1>

        <section class="productosGrilla" id="id_contenedorProductos">
            <!-- <article data-id="1">
                <a href="">
                    <img src="./recursos/imagenes/producto1.png" alt="Hoodie Black">
                    <h3>Hoodie Basic Balsamoa - Black</h3>
                    <p>$30.000,00</p>
                </a>
            </article> -->
        </section>

        <button type="button" id="id_btnMostarMas" class="botonMostrarMas">Mostrar más ...</button>
    </main>

    <div class="modalOverlay" id="id_modalOverlay"></div>
    <div class="modalProducto" id="id_modalProducto">
        <button class="modalCerrar" id="id_modalCerrar" title="Cerrar">&times;</button>
        
        <div class="modalContenido">
            <img src="./recursos/imagenes/ws.svg" alt="Imagen del producto" id="id_modalImagen">
            <div class="modalDetalles">
                <h2 id="id_modalNombre">Nombre Producto</h2>
                <p id="id_modalPrecio">$0.00</p>
                <p id="id_modalDescripcion">Aquí va la descripción del producto...</p>
                <h3>Talles disponibles:</h3>
                <div class="modalTalles" id="id_modalTalles">
                    </div>
            </div>
        </div>
    </div>

    <footer class="piePagina">
        <address class="contenidoPiePag">
            <a href="https://www.instagram.com/balsamoa1/" target="_blank" class="instagram">
                <img src="./recursos/imagenes/ig.svg" alt="Logo Instagram">@Balsamoa1
            </a>
            <span class="ubicacion">
                <img src="./recursos/imagenes/ubi.svg" alt="Logo Ubicacion">Cordoba, Argentina
            </span>
            <a href="https://wa.me/+5491111111" target="_blank" class="whatsapp">
                <img src="./recursos/imagenes/ws.svg" alt="Logo Whatsapp">WhatsApp
            </a>
        </address>
    </footer>
</body>

</html>
