<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./recursos/css/index.css">
    <link rel="icon" href="./recursos/imagenes/logo balsamoa.webp" type="image/webp">
    <script type="module" src="./recursos/js/menu.js"></script>
    <title>Balsamoa | Contacto</title>
</head>

<body>
    <header class="encabezadoPrincipal">
        <div class="contenidoEncPag">
            <a href="./index.html">
                <img src="./recursos/imagenes/logo balsamoa.webp" alt="Logo Balsamoa">
            </a>

            <!-- Boton menu de celular -->
            <button class="menuBtn" id="id_menuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav id="id_menuNav">
                <ul>
                    <li><a href="./index.html">Inicio</a></li>
                    <li><a href="./productos.html">Productos</a></li>
                    <li><a href="./nosotros.html">Nosotros</a></li>
                    <li><a href="./contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <!-- Fondo para boton menu de celular -->
    <div class="menuOverlay" id="id_menuOverlay"></div>

    <main>
        
        <h1>Contacto</h1>
        
        <form action="https://formspree.io/f/mkgkppkl" method="post" class="formularioContacto">
            <label for="id_nombre">
                Nombre
                <input type="text" name="nombre" id="id_nombre" required>
            </label>

            <label for="id_email">
                Email
                <input type="email" name="email" id="id_email" required>
            </label>

            <label for="id_telefono">
                Teléfono
                <input type="tel" name="telefono" id="id_telefono" required>
            </label>

            <label for="id_mensaje">
                Mensaje
                <textarea name="mensaje" id="id_mensaje" required></textarea>
            </label>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer class="piePagina">
        <address class="contenidoPiePag">
            <a href="https://www.instagram.com/balsamoa1/" target="_blank" class="instagram">
                <img src="./recursos/imagenes/ig.svg" alt="Logo Instagram">@Balsamoa1
            </a>
            <span class="ubicacion">
                <img src="./recursos/imagenes/ubi.svg" alt="Logo Ubicacion">Cordoba, Argentina
            </span>
            <a href="https://wa.me/+5491111111" target="_blank" class="whatsapp">
                <img src="./recursos/imagenes/ws.svg" alt="Logo Whatsapp">WhatsApp
            </a>
        </address>
    </footer>
</body>

</html>
